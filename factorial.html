<script>
// wap to find the factorial of a number using function.
function fact(a){
    if(a==0){
        console.log("Factorial is 1");
        
    }
    else if(a==1){
        console.log("Factorial is 1");
        
    }else if(a>1){
        let f =1;
        for(i=1;i<=a;i++){
               f=  f*i
        }
        console.log(`Factorial is ${f}`);
        
    }
}
fact(5)
</script>
