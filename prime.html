<script>
    //wap to check a number is prime or not using function
    function prime(a){
        let c = 0;
        for(i=1;i<=a;i++){
            if(a%i==0){
                c = c+1
            }
        }
        if(c==2){
            console.log(`${a} is prime number`);
            
        }else{
            console.log(`${a} is not prime number`);
        }
    }
    prime(11)
</script>
